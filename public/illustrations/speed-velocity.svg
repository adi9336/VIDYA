  <text x="62" y="72" fill="#18212F" font-family="Arial, sans-serif" font-size="30" font-weight="700">Speed vs Velocity</text>
  <text x="64" y="108" fill="#5F5647" font-family="Arial, sans-serif" font-size="22">Same speed can point in different directions.</text>
  <rect x="86" y="188" width="208" height="18" rx="9" fill="#1E6D5A"/>
  <path d="M274 178L322 197L274 216" stroke="#1E6D5A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="344" y="188" width="208" height="18" rx="9" fill="#FF8C42"/>
  <path d="M366 178L318 197L366 216" stroke="#FF8C42" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="108" y="172" fill="#18212F" font-family="Arial, sans-serif" font-size="20" font-weight="700">20 m/s East</text>
  <text x="392" y="172" fill="#18212F" font-family="Arial, sans-serif" font-size="20" font-weight="700">20 m/s West</text>
  <text x="176" y="286" fill="#5F5647" font-family="Arial, sans-serif" font-size="22">Speed same</text>
  <text x="372" y="286" fill="#5F5647" font-family="Arial, sans-serif" font-size="22">Velocity different</text>
